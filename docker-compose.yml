services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pure
      POSTGRES_PASSWORD: pure
      POSTGRES_DB: pure_finance
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pure"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: pytest

  migrate:
    build: .
    command: alembic upgrade head
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pure:pure@postgres:5432/pure_finance
    depends_on:
      postgres:
        condition: service_healthy

  run:
    build: .
    command: uvicorn src.api.main:create_production_app --factory --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pure:pure@postgres:5432/pure_finance
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./src:/app/src
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pure:pure@postgres:5432/pure_finance
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A src.workers.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./src:/app/src
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pure:pure@postgres:5432/pure_finance
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
